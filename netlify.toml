[build]
  command   = "npx expo export --platform web && cp _headers dist/_headers && cp _redirects dist/_redirects"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA routing — all paths fall back to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
